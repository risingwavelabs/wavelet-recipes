<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spend Control — Wavelet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg: #f4f2ee;
      --surface: #ffffff;
      --border: #e3e0db;
      --border-light: #eceae5;
      --text: #1c1b19;
      --text-2: #5c5a56;
      --text-3: #9b9892;
      --ink: #2c2b28;
      --accent: #1a56db;
      --positive: #1a7a42;
      --negative: #c93b3b;
      --warning: #b45d1e;
      --shadow-sm: 0 1px 2px rgba(28,27,25,0.04);
      --shadow-md:
        0 1px 3px rgba(28,27,25,0.04),
        0 4px 12px rgba(28,27,25,0.03);
      --sans: "Instrument Sans", -apple-system, sans-serif;
      --mono: "IBM Plex Mono", "SFMono-Regular", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Nav ---- */
    nav {
      height: 52px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .nav-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .nav-title span {
      color: var(--text-3);
      font-weight: 400;
      margin: 0 6px;
    }

    .nav-page { font-weight: 500; color: var(--text-2); }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 9px;
      background: var(--bg);
    }

    .pill-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--text-3);
      transition: background 0.4s;
    }

    .pill.on .pill-dot { background: var(--positive); }
    .pill.on { color: var(--text-2); }

    /* ---- Layout ---- */
    .page {
      max-width: 1020px;
      margin: 0 auto;
      padding: 24px 28px 60px;
      display: grid;
      gap: 14px;
    }

    /* ---- Metric strip ---- */
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .metric {
      padding: 20px 22px;
      border-right: 1px solid var(--border-light);
    }

    .metric:last-child { border-right: none; }

    .metric-label {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-3);
      margin-bottom: 6px;
    }

    .metric-num {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.04em;
      line-height: 1.1;
      transition: color 0.5s ease;
    }

    .metric-num.flash { color: var(--positive); }

    /* ---- Cards ---- */
    .row {
      display: grid;
      grid-template-columns: 1.4fr 0.6fr;
      gap: 14px;
    }

    .row-equal {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .card-head {
      padding: 13px 20px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-2);
      border-bottom: 1px solid var(--border-light);
    }

    .card-body { padding: 18px 20px; }

    .chart-box { position: relative; height: 200px; }

    /* ---- Table ---- */
    table { width: 100%; border-collapse: collapse; }

    th {
      text-align: left;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 9px 20px;
      border-bottom: 1px solid var(--border-light);
    }

    td {
      padding: 10px 20px;
      font-size: 13px;
      border-bottom: 1px solid rgba(0,0,0,0.03);
    }

    tr:last-child td { border-bottom: none; }

    .new-row { animation: highlight 0.7s ease-out; }
    @keyframes highlight {
      from { background: rgba(26,122,66,0.05); }
      to { background: transparent; }
    }

    .tag {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      background: rgba(26,86,219,0.06);
      padding: 2px 7px;
      border-radius: 4px;
    }

    .tag-alert {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--negative);
      background: rgba(201,59,59,0.08);
      padding: 2px 7px;
      border-radius: 4px;
    }

    .tag-action {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--warning);
      background: rgba(180,93,30,0.08);
      padding: 2px 7px;
      border-radius: 4px;
    }

    .money {
      font-family: var(--mono);
      font-size: 12.5px;
      font-weight: 600;
      color: var(--positive);
    }

    .money-over {
      font-family: var(--mono);
      font-size: 12.5px;
      font-weight: 600;
      color: var(--negative);
    }

    .secondary { color: var(--text-2); }

    .timestamp {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
    }

    .mono-sm {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--text-2);
    }

    /* ---- Alert card ---- */
    .alert-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .alert-item:last-child { border-bottom: none; }

    .alert-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .alert-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--negative);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .alert-team {
      font-weight: 600;
      font-size: 13px;
    }

    .alert-spend {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--negative);
    }

    .empty-state {
      padding: 24px 20px;
      text-align: center;
      font-size: 12.5px;
      color: var(--text-3);
    }

    .foot {
      text-align: center;
      padding: 16px 0;
      font-size: 11px;
      color: var(--text-3);
    }

    .foot a {
      color: var(--text-2);
      text-decoration: none;
      transition: color 0.15s;
    }

    .foot a:hover { color: var(--ink); }

    /* ---- Entrance ---- */
    .metric, .card {
      animation: enter 0.45s ease-out both;
    }

    .metrics .metric:nth-child(1) { animation-delay: 0s; }
    .metrics .metric:nth-child(2) { animation-delay: 0.03s; }
    .metrics .metric:nth-child(3) { animation-delay: 0.06s; }
    .metrics .metric:nth-child(4) { animation-delay: 0.09s; }

    @keyframes enter {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .metric:nth-child(2) { border-right: none; }
      .metric:nth-child(3), .metric:nth-child(4) { border-top: 1px solid var(--border-light); }
      .row, .row-equal { grid-template-columns: 1fr; }
      .page { padding: 16px 12px 40px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-title">Wavelet<span>/</span><span class="nav-page">Spend Control</span></div>
    <div class="pill" id="pill">
      <span class="pill-dot"></span>
      <span id="statusText">connecting</span>
    </div>
  </nav>

  <div class="page">
    <!-- Metrics strip -->
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Total Spend</div>
        <div class="metric-num" id="totalSpend">$0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Total API Calls</div>
        <div class="metric-num" id="totalCalls">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Avg Cost / Call</div>
        <div class="metric-num" id="avgCost">$0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Active Teams</div>
        <div class="metric-num" id="activeTeams">0</div>
      </div>
    </div>

    <!-- Charts row -->
    <div class="row" style="animation-delay:0.12s">
      <div class="card">
        <div class="card-head">Spend by Team</div>
        <div class="card-body"><div class="chart-box"><canvas id="teamChart"></canvas></div></div>
      </div>
      <div class="card">
        <div class="card-head">Spend by Model</div>
        <div class="card-body"><div class="chart-box"><canvas id="modelChart"></canvas></div></div>
      </div>
    </div>

    <!-- Alerts + Actions row -->
    <div class="row-equal" style="animation-delay:0.18s">
      <div class="card">
        <div class="card-head">Budget Alerts</div>
        <div id="alertsBody">
          <div class="empty-state">No teams over budget yet</div>
        </div>
      </div>
      <div class="card">
        <div class="card-head">Agent Actions</div>
        <div id="actionsBody">
          <div class="empty-state">No actions taken yet</div>
        </div>
      </div>
    </div>

    <!-- Recent calls table -->
    <div class="card" style="animation-delay:0.24s">
      <div class="card-head">Recent API Calls</div>
      <div>
        <table>
          <thead><tr>
            <th>Team</th><th>Model</th><th>Input Tok</th><th>Output Tok</th><th>Cost</th><th>User</th><th>Time</th>
          </tr></thead>
          <tbody id="callsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="foot">
    <a href="https://github.com/risingwavelabs/wavelet">Wavelet</a> + <a href="https://github.com/risingwavelabs/risingwave">RisingWave</a>
  </div>

  <script>
    const BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:8080'
      : `http://${window.location.hostname}:8080`
    const WS = BASE.replace('http', 'ws')

    const BUDGET_THRESHOLD = 50

    // ---- Animated numbers ----
    const st = {}
    function tick(el, target, prefix, decimals) {
      const id = el.id
      if (!st[id]) st[id] = { v: 0, raf: null }
      const s = st[id]; s.target = target
      if (s.raf) return
      const from = s.v, t0 = performance.now()
      ;(function run(now) {
        const p = Math.min((now - t0) / 400, 1)
        s.v = from + (s.target - from) * (1 - Math.pow(1 - p, 3))
        if (decimals) {
          el.textContent = (prefix || '') + s.v.toFixed(decimals)
        } else {
          el.textContent = (prefix || '') + Math.round(s.v).toLocaleString()
        }
        if (p < 1) s.raf = requestAnimationFrame(run)
        else { s.raf = null; s.v = s.target }
      })(t0)
      el.classList.add('flash')
      setTimeout(() => el.classList.remove('flash'), 600)
    }

    // ---- Charts ----
    Chart.defaults.color = '#9b9892'
    Chart.defaults.borderColor = 'rgba(0,0,0,0.04)'
    Chart.defaults.font.family = '"Instrument Sans", sans-serif'
    Chart.defaults.font.size = 11

    const pal = ['#1a56db', '#2d7a4f', '#b45d1e', '#8b3db6', '#c93b3b']

    // Horizontal bar chart for team spend
    const teamChart = new Chart(document.getElementById('teamChart'), {
      type: 'bar',
      data: {
        labels: [],
        datasets: [{
          data: [],
          backgroundColor: pal,
          borderRadius: 3,
          borderSkipped: false,
          maxBarThickness: 28,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          annotation: undefined,
        },
        scales: {
          x: {
            grid: { color: 'rgba(0,0,0,0.04)' },
            ticks: {
              callback: v => '$' + v,
              font: { family: '"IBM Plex Mono"', size: 10 },
            },
          },
          y: {
            grid: { display: false },
            ticks: { font: { size: 11 } },
          },
        },
        animation: { duration: 350, easing: 'easeOutCubic' },
      },
      plugins: [{
        id: 'budgetLine',
        afterDraw(chart) {
          const xScale = chart.scales.x
          const ctx = chart.ctx
          const xPos = xScale.getPixelForValue(BUDGET_THRESHOLD)
          if (xPos < xScale.left || xPos > xScale.right) return
          ctx.save()
          ctx.beginPath()
          ctx.setLineDash([6, 4])
          ctx.strokeStyle = '#c93b3b'
          ctx.lineWidth = 1.5
          ctx.moveTo(xPos, chart.chartArea.top)
          ctx.lineTo(xPos, chart.chartArea.bottom)
          ctx.stroke()
          ctx.setLineDash([])
          ctx.fillStyle = '#c93b3b'
          ctx.font = '500 10px "IBM Plex Mono"'
          ctx.textAlign = 'left'
          ctx.fillText('$50 budget', xPos + 4, chart.chartArea.top + 10)
          ctx.restore()
        }
      }],
    })

    // Doughnut chart for model spend
    const modelChart = new Chart(document.getElementById('modelChart'), {
      type: 'doughnut',
      data: {
        labels: [],
        datasets: [{
          data: [],
          backgroundColor: pal,
          borderWidth: 0,
          spacing: 2,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '66%',
        plugins: {
          legend: {
            position: 'right',
            labels: {
              color: '#5c5a56',
              font: { size: 10 },
              padding: 8,
              usePointStyle: true,
              pointStyleWidth: 6,
            },
          },
        },
        animation: { duration: 350, easing: 'easeOutCubic' },
      },
    })

    // ---- Format helpers ----
    function shortModel(name) {
      return name.replace('claude-sonnet-4-20250514', 'sonnet-4')
                 .replace('claude-opus-4-20250514', 'opus-4')
                 .replace('claude-haiku', 'haiku')
    }

    function formatTokens(n) {
      n = Number(n)
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M'
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k'
      return n.toString()
    }

    // ---- Subscribe ----
    let wsConnected = false

    function sub(query, fn) {
      const poll = () => fetch(`${BASE}/v1/queries/${query}`)
        .then(r => r.json())
        .then(d => fn(d.rows || d))
        .catch(() => {})
      poll()
      setInterval(poll, 1000)
      ;(function ws() {
        const c = new WebSocket(`${WS}/subscribe/${query}`)
        c.onopen = () => {
          if (!wsConnected) {
            wsConnected = true
            document.getElementById('pill').classList.add('on')
            document.getElementById('statusText').textContent = 'live'
          }
        }
        c.onmessage = e => {
          try {
            if (JSON.parse(e.data).type === 'diff') poll()
          } catch {}
        }
        c.onclose = () => {
          wsConnected = false
          document.getElementById('pill').classList.remove('on')
          document.getElementById('statusText').textContent = 'reconnecting'
          setTimeout(ws, 2000)
        }
        c.onerror = () => c.close()
      })()
    }

    // ---- Team spend -> metrics + bar chart ----
    sub('team_spend', rows => {
      const totalSpend = rows.reduce((s, r) => s + Number(r.total_spend_usd), 0)
      const totalCalls = rows.reduce((s, r) => s + Number(r.total_calls), 0)
      const avgCost = totalCalls > 0 ? totalSpend / totalCalls : 0

      tick(document.getElementById('totalSpend'), totalSpend, '$', 2)
      tick(document.getElementById('totalCalls'), totalCalls)
      tick(document.getElementById('avgCost'), avgCost, '$', 3)
      tick(document.getElementById('activeTeams'), rows.length)

      teamChart.data.labels = rows.map(r => r.team)
      teamChart.data.datasets[0].data = rows.map(r => Number(r.total_spend_usd))
      teamChart.data.datasets[0].backgroundColor = rows.map((r, i) =>
        Number(r.total_spend_usd) > BUDGET_THRESHOLD ? '#c93b3b' : pal[i % pal.length]
      )
      teamChart.update()
    })

    // ---- Model usage -> doughnut ----
    sub('model_usage', rows => {
      modelChart.data.labels = rows.map(r => shortModel(r.model))
      modelChart.data.datasets[0].data = rows.map(r => Number(r.spend_usd))
      modelChart.update()
    })

    // ---- Budget alerts ----
    sub('budget_alerts', rows => {
      const container = document.getElementById('alertsBody')
      if (!rows || rows.length === 0) {
        container.innerHTML = '<div class="empty-state">No teams over budget yet</div>'
        return
      }
      container.innerHTML = rows.map(r => {
        const spend = Number(r.total_spend_usd).toFixed(2)
        return `
          <div class="alert-item">
            <div class="alert-left">
              <div class="alert-dot"></div>
              <span class="alert-team">${r.team}</span>
              <span class="tag-alert">${Number(r.total_calls).toLocaleString()} calls</span>
            </div>
            <span class="alert-spend">$${spend}</span>
          </div>
        `
      }).join('')
    })

    // ---- Agent actions ----
    sub('action_log', rows => {
      const container = document.getElementById('actionsBody')
      if (!rows || rows.length === 0) {
        container.innerHTML = '<div class="empty-state">No actions taken yet</div>'
        return
      }
      container.innerHTML = rows.map(r => `
        <div class="alert-item">
          <div class="alert-left">
            <span class="tag-action">${r.action}</span>
            <span class="secondary" style="font-size:12.5px">${r.team}</span>
          </div>
          <span class="timestamp">${new Date(r.ts).toLocaleTimeString()}</span>
        </div>
      `).join('')
    })

    // ---- Recent calls table ----
    sub('recent_calls', rows => {
      document.getElementById('callsBody').innerHTML = rows.slice(0, 15).map((r, i) => {
        const cost = Number(r.cost_cents)
        const costUsd = (cost / 100).toFixed(3)
        const isExpensive = cost > 5
        return `
          <tr class="${i < 2 ? 'new-row' : ''}">
            <td><span class="tag">${r.team}</span></td>
            <td class="secondary" style="font-size:12px">${shortModel(r.model)}</td>
            <td class="mono-sm">${formatTokens(r.input_tokens)}</td>
            <td class="mono-sm">${formatTokens(r.output_tokens)}</td>
            <td><span class="${isExpensive ? 'money-over' : 'money'}">$${costUsd}</span></td>
            <td class="secondary">${r.user_id}</td>
            <td class="timestamp">${new Date(r.ts).toLocaleTimeString()}</td>
          </tr>
        `
      }).join('')
    })
  </script>
</body>
</html>
